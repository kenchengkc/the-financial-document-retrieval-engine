# Railway service config for the FDRE API.
# Build from the repo-root Dockerfile; health-check the /health endpoint.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "alembic upgrade head"
startCommand = "uvicorn apps.api.app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
