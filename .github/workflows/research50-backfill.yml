name: Research 50 filing backfill

# Builds deeper point-in-time coverage for the fixed 50-name research universe.
# Use small batches and chain=true to walk the universe without evicting other
# ingestion workflows. The shared database advisory lock serializes writes.

on:
  workflow_dispatch:
    inputs:
      offset:
        description: "Batch offset into RESEARCH_UNIVERSE_TICKERS"
        default: "0"
      limit:
        description: "Batch size (tickers per run)"
        default: "5"
      filing_limit:
        description: "Fallback latest N filings per form per company"
        default: "1"
      annual_limit:
        description: "Latest N 10-K filings per company"
        default: "3"
      quarterly_limit:
        description: "Latest N 10-Q filings per company"
        default: "8"
      force_parse:
        description: "Reparse unchanged filings after parser updates"
        type: boolean
        default: false
      chain:
        description: "On success, automatically queue the next offset+limit batch"
        type: boolean
        default: false
      index_only:
        description: "Skip metadata/download/chunk; only embed missing chunks"
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

concurrency:
  group: fdre-research50-backfill
  cancel-in-progress: false

jobs:
  prerequisites:
    name: Check backfill prerequisites
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          provider_ready=true
          if [ "${EMBEDDING_PROVIDER}" = "voyage" ] && [ -z "${VOYAGE_API_KEY}" ]; then
            provider_ready=false
          fi
          if [ "${EMBEDDING_PROVIDER}" = "openai" ] && [ -z "${OPENAI_API_KEY}" ]; then
            provider_ready=false
          fi
          if { [ -n "${DATABASE_URL_DIRECT}" ] || [ -n "${DATABASE_URL_POOLED}" ]; } \
            && [ -n "${SEC_USER_AGENT}" ] && [ "${provider_ready}" = true ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping backfill until database, SEC, and embedding provider credentials are configured."
          fi

  backfill:
    name: Backfill research ticker batch
    needs: prerequisites
    if: needs.prerequisites.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'local-hash-v1' }}
      EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS || '' }}
      EMBEDDING_BATCH_SIZE: ${{ vars.EMBEDDING_BATCH_SIZE || '128' }}
      EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE || '2000' }}
      EMBEDDING_TOKENS_PER_MINUTE: ${{ vars.EMBEDDING_TOKENS_PER_MINUTE || '3000000' }}
      EMBEDDING_CONCURRENCY: ${{ vars.EMBEDDING_CONCURRENCY || '8' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      PYTHONPATH: .
      OFFSET: ${{ github.event.inputs.offset || '0' }}
      LIMIT: ${{ github.event.inputs.limit || '5' }}
      FILING_LIMIT: ${{ github.event.inputs.filing_limit || '1' }}
      ANNUAL_LIMIT: ${{ github.event.inputs.annual_limit || '3' }}
      QUARTERLY_LIMIT: ${{ github.event.inputs.quarterly_limit || '8' }}
      FORCE_PARSE: ${{ github.event.inputs.force_parse || 'false' }}
      INDEX_ONLY: ${{ github.event.inputs.index_only || 'false' }}
    steps:
      - name: Validate inputs
        run: |
          [[ "${OFFSET}" =~ ^[0-9]+$ ]]
          [[ "${LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${FILING_LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ANNUAL_LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${QUARTERLY_LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${FORCE_PARSE}" =~ ^(true|false)$ ]]
          [[ "${INDEX_ONLY}" =~ ^(true|false)$ ]]

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Use direct database URL for ingest
        run: |
          if [ -n "${DATABASE_URL_DIRECT}" ]; then
            echo "::notice::Using DATABASE_URL_DIRECT for research backfill."
            echo "DATABASE_URL=${DATABASE_URL_DIRECT}" >> "${GITHUB_ENV}"
          else
            echo "::notice::DATABASE_URL_DIRECT not set; using DATABASE_URL."
            echo "DATABASE_URL=${DATABASE_URL_POOLED}" >> "${GITHUB_ENV}"
          fi

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run research filing backfill
        run: |
          force_args=()
          if [ "${FORCE_PARSE}" = "true" ]; then
            force_args+=(--force-parse --force-rechunk)
          fi
          index_args=()
          if [ "${INDEX_ONLY}" = "true" ]; then
            index_args+=(--index-only)
          fi
          python scripts/ingest_ticker_batch.py \
            --universe research50 \
            --offset "${OFFSET}" \
            --limit "${LIMIT}" \
            --filing-limit "${FILING_LIMIT}" \
            --annual-limit "${ANNUAL_LIMIT}" \
            --quarterly-limit "${QUARTERLY_LIMIT}" \
            "${force_args[@]}" \
            "${index_args[@]}"

      - name: Publish data-quality audit
        if: always()
        run: python -m scripts.retrieval_pipeline audit

      - name: Queue next research backfill batch
        if: success() && github.event.inputs.chain == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          next_offset=$((OFFSET + LIMIT))
          if [ "${next_offset}" -lt 50 ]; then
            echo "::notice::Queueing next research backfill at offset ${next_offset}"
            gh workflow run "Research 50 filing backfill" \
              -f offset="${next_offset}" \
              -f limit="${LIMIT}" \
              -f filing_limit="${FILING_LIMIT}" \
              -f annual_limit="${ANNUAL_LIMIT}" \
              -f quarterly_limit="${QUARTERLY_LIMIT}" \
              -f force_parse="${FORCE_PARSE}" \
              -f index_only="${INDEX_ONLY}" \
              -f chain=true
          else
            echo "::notice::Research 50 backfill chain complete (offset ${OFFSET})."
          fi
