name: S&P 500 batch ingestion

# Runs one S&P 500 ticker batch through the full SEC ingest pipeline.
# Use workflow_dispatch with offset/limit to walk the universe over time.
# Requires DATABASE_URL (Neon pooled), optional DATABASE_URL_DIRECT (Neon direct for ingest),
# SEC_USER_AGENT, and embedding provider secrets (see ingest.yml and docs/neon-migration.md).

on:
  workflow_dispatch:
    inputs:
      offset:
        description: "Batch offset into sp500_tickers.json"
        default: "0"
      limit:
        description: "Batch size (tickers per run)"
        default: "10"
      filing_limit:
        description: "Latest N filings per form per company"
        default: "1"
      annual_limit:
        description: "Latest N 10-K filings per company (optional override)"
        default: ""
      quarterly_limit:
        description: "Latest N 10-Q filings per company (optional override)"
        default: ""
      force_parse:
        description: "Reparse unchanged filings after parser updates"
        type: boolean
        default: false
      chain:
        description: "On success, automatically queue the next offset+limit batch"
        type: boolean
        default: false
      index_only:
        description: "Skip metadata/download/chunk; only embed missing chunks (recovery)"
        type: boolean
        default: false
      lane_spec:
        description: "Parallel lane as LANE:LANES_TOTAL:RANGE_END (e.g. 1:4:180); disjoint lanes run concurrently"
        default: "0:1:499"

permissions:
  contents: read
  actions: write

concurrency:
  # One concurrency group per lane_spec: a lane's own batches queue (serialize),
  # while disjoint lanes run in parallel. scripts/ingest_ticker_batch.py holds a
  # per-lane Postgres advisory lock so concurrent lanes can't collide on writes.
  group: fdre-sp500-ingestion-lane-${{ github.event.inputs.lane_spec || '0:1:499' }}
  cancel-in-progress: false

jobs:
  prerequisites:
    name: Check ingestion prerequisites
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          provider_ready=true
          if [ "${EMBEDDING_PROVIDER}" = "voyage" ] && [ -z "${VOYAGE_API_KEY}" ]; then
            provider_ready=false
          fi
          if [ "${EMBEDDING_PROVIDER}" = "openai" ] && [ -z "${OPENAI_API_KEY}" ]; then
            provider_ready=false
          fi
          if { [ -n "${DATABASE_URL_DIRECT}" ] || [ -n "${DATABASE_URL_POOLED}" ]; } \
            && [ -n "${SEC_USER_AGENT}" ] && [ "${provider_ready}" = true ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping S&P 500 batch until database, SEC, and embedding provider credentials are configured."
          fi

  ingest-batch:
    name: Ingest S&P 500 batch
    needs: prerequisites
    if: needs.prerequisites.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    # Heavy batches (utilities/financials with very large 10-Ks) can exceed
    # 3h; give generous headroom so a batch can't be cancelled mid-embed and
    # break the self-chaining walk. Pair with a small per-batch `limit`.
    timeout-minutes: 330
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'local-hash-v1' }}
      EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS || '' }}
      EMBEDDING_BATCH_SIZE: ${{ vars.EMBEDDING_BATCH_SIZE || '128' }}
      EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE || '2000' }}
      EMBEDDING_TOKENS_PER_MINUTE: ${{ vars.EMBEDDING_TOKENS_PER_MINUTE || '3000000' }}
      EMBEDDING_CONCURRENCY: ${{ vars.EMBEDDING_CONCURRENCY || '8' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      PYTHONPATH: .
      OFFSET: ${{ github.event.inputs.offset || '0' }}
      LIMIT: ${{ github.event.inputs.limit || '10' }}
      FILING_LIMIT: ${{ github.event.inputs.filing_limit || '1' }}
      ANNUAL_LIMIT: ${{ github.event.inputs.annual_limit || '' }}
      QUARTERLY_LIMIT: ${{ github.event.inputs.quarterly_limit || '' }}
      FORCE_PARSE: ${{ github.event.inputs.force_parse || 'false' }}
      INDEX_ONLY: ${{ github.event.inputs.index_only || 'false' }}
      LANE_SPEC: ${{ github.event.inputs.lane_spec || '0:1:499' }}
    steps:
      - name: Parse lane spec
        run: |
          IFS=':' read -r lane lanes_total range_end <<< "${LANE_SPEC}"
          : "${lane:=0}"; : "${lanes_total:=1}"; : "${range_end:=499}"
          {
            echo "LANE=${lane}"
            echo "LANES_TOTAL=${lanes_total}"
            echo "RANGE_END=${range_end}"
          } >> "${GITHUB_ENV}"

      - name: Validate inputs
        run: |
          [[ "${OFFSET}" =~ ^[0-9]+$ ]]
          [[ "${LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${FILING_LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ANNUAL_LIMIT}" =~ ^$|^[1-9][0-9]*$ ]]
          [[ "${QUARTERLY_LIMIT}" =~ ^$|^[1-9][0-9]*$ ]]
          [[ "${FORCE_PARSE}" =~ ^(true|false)$ ]]
          [[ "${INDEX_ONLY}" =~ ^(true|false)$ ]]
          [[ "${LANE}" =~ ^[0-9]+$ ]]
          [[ "${LANES_TOTAL}" =~ ^[1-9][0-9]*$ ]]
          [[ "${RANGE_END}" =~ ^[1-9][0-9]*$ ]]

      - name: Divide embedding rate budget across lanes
        run: |
          base_rpm="${EMBEDDING_REQUESTS_PER_MINUTE:-2000}"
          base_tpm="${EMBEDDING_TOKENS_PER_MINUTE:-3000000}"
          lane_rpm=$(( base_rpm / LANES_TOTAL ))
          lane_tpm=$(( base_tpm / LANES_TOTAL ))
          [ "${lane_rpm}" -lt 1 ] && lane_rpm=1
          [ "${lane_tpm}" -lt 1 ] && lane_tpm=1
          echo "EMBEDDING_REQUESTS_PER_MINUTE=${lane_rpm}" >> "${GITHUB_ENV}"
          echo "EMBEDDING_TOKENS_PER_MINUTE=${lane_tpm}" >> "${GITHUB_ENV}"
          echo "::notice::lane ${LANE}/${LANES_TOTAL} embedding budget: ${lane_rpm} rpm / ${lane_tpm} tpm"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Use direct database URL for ingest
        run: |
          if [ -n "${DATABASE_URL_DIRECT}" ]; then
            echo "::notice::Using DATABASE_URL_DIRECT for S&P 500 batch ingest."
            echo "DATABASE_URL=${DATABASE_URL_DIRECT}" >> "${GITHUB_ENV}"
          else
            echo "::notice::DATABASE_URL_DIRECT not set; using DATABASE_URL."
            echo "DATABASE_URL=${DATABASE_URL_POOLED}" >> "${GITHUB_ENV}"
          fi

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run S&P 500 batch ingest
        run: |
          force_args=()
          if [ "${FORCE_PARSE}" = "true" ]; then
            force_args+=(--force-parse --force-rechunk)
          fi
          index_args=()
          if [ "${INDEX_ONLY}" = "true" ]; then
            index_args+=(--index-only)
          fi
          history_args=(--filing-limit "${FILING_LIMIT}")
          if [ -n "${ANNUAL_LIMIT}" ]; then
            history_args+=(--annual-limit "${ANNUAL_LIMIT}")
          fi
          if [ -n "${QUARTERLY_LIMIT}" ]; then
            history_args+=(--quarterly-limit "${QUARTERLY_LIMIT}")
          fi
          python scripts/ingest_ticker_batch.py \
            --universe sp500 \
            --offset "${OFFSET}" \
            --limit "${LIMIT}" \
            --lane "${LANE}" \
            "${history_args[@]}" \
            "${force_args[@]}" \
            "${index_args[@]}"

      - name: Publish data-quality audit
        if: always()
        run: python -m scripts.retrieval_pipeline audit

      - name: Queue next S&P 500 batch
        if: success() && github.event.inputs.chain == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          next_offset=$((OFFSET + LIMIT))
          if [ "${next_offset}" -lt "${RANGE_END}" ]; then
            echo "::notice::Queueing lane ${LANE} next batch at offset ${next_offset}"
            gh workflow run "S&P 500 batch ingestion" \
              -f offset="${next_offset}" \
              -f limit="${LIMIT}" \
              -f filing_limit="${FILING_LIMIT}" \
              -f annual_limit="${ANNUAL_LIMIT}" \
              -f quarterly_limit="${QUARTERLY_LIMIT}" \
              -f force_parse="${FORCE_PARSE}" \
              -f index_only="${INDEX_ONLY}" \
              -f lane_spec="${LANE_SPEC}" \
              -f chain=true
          else
            echo "::notice::S&P 500 ingest lane ${LANE} complete (offset ${OFFSET}, range_end ${RANGE_END})."
          fi
