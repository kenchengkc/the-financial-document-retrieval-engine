name: Scheduled SEC ingestion

# Loads SEC filings into the production database over time.
# Requires repository secrets:
#   DATABASE_URL         -> Neon pooled URL (or legacy Railway Postgres public URL)
#   DATABASE_URL_DIRECT  -> optional Neon direct URL for long ingest jobs
#   SEC_USER_AGENT       -> e.g. "FDRE your-email@example.com" (SEC requires a descriptive UA)
# See docs/neon-migration.md. The job is a no-op if database/SEC secrets are missing.

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers (blank = full S&P 500)"
        default: ""
      forms:
        description: "Space-separated form types"
        default: "10-K 10-Q"
      limit:
        description: "Latest N filings per form per company"
        default: "1"
      annual_limit:
        description: "Latest N 10-K filings per company (optional override)"
        default: ""
      quarterly_limit:
        description: "Latest N 10-Q filings per company (optional override)"
        default: ""
      force_parse:
        description: "Reparse unchanged filings after parser updates"
        type: boolean
        default: false
  schedule:
    # Daily incremental filing check; the post-run audit also exceeds the weekly requirement.
    - cron: "0 9 * * *"

permissions:
  contents: read

concurrency:
  # Keep scheduled/manual incremental checks from evicting queued S&P batches.
  # scripts/ingest_ticker_batch.py serializes database ingestion across workflows.
  group: fdre-scheduled-ingestion
  cancel-in-progress: false

jobs:
  prerequisites:
    name: Check ingestion prerequisites
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          provider_ready=true
          if [ "${EMBEDDING_PROVIDER}" = "voyage" ] && [ -z "${VOYAGE_API_KEY}" ]; then
            provider_ready=false
          fi
          if [ "${EMBEDDING_PROVIDER}" = "openai" ] && [ -z "${OPENAI_API_KEY}" ]; then
            provider_ready=false
          fi
          if { [ -n "${DATABASE_URL_DIRECT}" ] || [ -n "${DATABASE_URL_POOLED}" ]; } \
            && [ -n "${SEC_USER_AGENT}" ] && [ "${provider_ready}" = true ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping ingestion until database, SEC, and embedding provider credentials are configured."
          fi

  ingest:
    name: Ingest filings
    needs: prerequisites
    if: needs.prerequisites.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'local-hash-v1' }}
      EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS || '' }}
      EMBEDDING_BATCH_SIZE: ${{ vars.EMBEDDING_BATCH_SIZE || '128' }}
      EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE || '2000' }}
      EMBEDDING_TOKENS_PER_MINUTE: ${{ vars.EMBEDDING_TOKENS_PER_MINUTE || '3000000' }}
      EMBEDDING_CONCURRENCY: ${{ vars.EMBEDDING_CONCURRENCY || '8' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      PYTHONPATH: .
      TICKERS: ${{ github.event.inputs.tickers || '' }}
      FORMS: ${{ github.event.inputs.forms || '10-K 10-Q' }}
      LIMIT: ${{ github.event.inputs.limit || '1' }}
      ANNUAL_LIMIT: ${{ github.event.inputs.annual_limit || '' }}
      QUARTERLY_LIMIT: ${{ github.event.inputs.quarterly_limit || '' }}
      FORCE_PARSE: ${{ github.event.inputs.force_parse || 'false' }}
    steps:
      - name: Validate inputs
        run: |
          [[ "${TICKERS}" =~ ^$|^[A-Z0-9.-]+([[:space:]]+[A-Z0-9.-]+)*$ ]]
          [[ "${FORMS}" =~ ^[0-9A-Z-]+([[:space:]]+[0-9A-Z-]+)*$ ]]
          [[ "${LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${ANNUAL_LIMIT}" =~ ^$|^[1-9][0-9]*$ ]]
          [[ "${QUARTERLY_LIMIT}" =~ ^$|^[1-9][0-9]*$ ]]
          [[ "${FORCE_PARSE}" =~ ^(true|false)$ ]]

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Use direct database URL for ingest
        run: |
          if [ -n "${DATABASE_URL_DIRECT}" ]; then
            echo "::notice::Using DATABASE_URL_DIRECT for SEC ingest."
            echo "DATABASE_URL=${DATABASE_URL_DIRECT}" >> "${GITHUB_ENV}"
          else
            echo "::notice::DATABASE_URL_DIRECT not set; using DATABASE_URL."
            echo "DATABASE_URL=${DATABASE_URL_POOLED}" >> "${GITHUB_ENV}"
          fi

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run incremental filing ingest
        run: |
          read -r -a form_args <<< "${FORMS}"
          force_args=()
          if [ "${FORCE_PARSE}" = "true" ]; then
            force_args+=(--force-parse --force-rechunk)
          fi
          lock_args=()
          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            lock_args+=(--skip-if-locked)
          fi
          history_args=(--filing-limit "${LIMIT}")
          if [ -n "${ANNUAL_LIMIT}" ]; then
            history_args+=(--annual-limit "${ANNUAL_LIMIT}")
          fi
          if [ -n "${QUARTERLY_LIMIT}" ]; then
            history_args+=(--quarterly-limit "${QUARTERLY_LIMIT}")
          fi
          # Explicit tickers override; otherwise refresh the whole S&P 500
          # incrementally. --filing-limit keeps only the latest N per form and the
          # pipeline skips already-ingested filings, so quiet days are cheap no-ops
          # and only newly-filed reports are parsed and embedded.
          if [ -n "${TICKERS}" ]; then
            read -r -a ticker_args <<< "${TICKERS}"
            selection_args=(--tickers "${ticker_args[@]}")
          else
            selection_args=(--universe sp500 --offset 0 --limit 500)
          fi
          python scripts/ingest_ticker_batch.py \
            "${selection_args[@]}" \
            --forms "${form_args[@]}" \
            "${history_args[@]}" \
            "${force_args[@]}" \
            "${lock_args[@]}"

      - name: Publish data-quality audit
        if: always()
        run: python -m scripts.retrieval_pipeline audit
