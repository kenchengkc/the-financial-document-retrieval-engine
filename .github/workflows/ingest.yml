name: Scheduled SEC ingestion

# Loads SEC filings into the production database over time.
# Requires two repository secrets:
#   DATABASE_URL    -> Railway Postgres PUBLIC url (Postgres service -> Variables -> DATABASE_PUBLIC_URL)
#   SEC_USER_AGENT  -> e.g. "FDRE your-email@example.com" (SEC requires a descriptive UA)
# The job is a no-op (skips) if DATABASE_URL is not configured, to avoid failure noise.

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers"
        default: "AAPL MSFT NVDA AMZN GOOGL"
      forms:
        description: "Space-separated form types"
        default: "10-K 10-Q"
      limit:
        description: "Latest N filings per form per company"
        default: "1"
      force_parse:
        description: "Reparse unchanged filings after parser updates"
        type: boolean
        default: false
  schedule:
    # Weekly, Monday 09:00 UTC. Tune or remove as needed.
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: sec-ingestion
  cancel-in-progress: false

jobs:
  prerequisites:
    name: Check ingestion prerequisites
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          provider_ready=true
          if [ "${EMBEDDING_PROVIDER}" = "voyage" ] && [ -z "${VOYAGE_API_KEY}" ]; then
            provider_ready=false
          fi
          if [ "${EMBEDDING_PROVIDER}" = "openai" ] && [ -z "${OPENAI_API_KEY}" ]; then
            provider_ready=false
          fi
          if [ -n "${DATABASE_URL}" ] && [ -n "${SEC_USER_AGENT}" ] && [ "${provider_ready}" = true ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping ingestion until database, SEC, and embedding provider credentials are configured."
          fi

  ingest:
    name: Ingest filings
    needs: prerequisites
    if: needs.prerequisites.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER || 'local_hash' }}
      EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL || 'local-hash-v1' }}
      EMBEDDING_DIMENSIONS: ${{ vars.EMBEDDING_DIMENSIONS || '' }}
      EMBEDDING_BATCH_SIZE: ${{ vars.EMBEDDING_BATCH_SIZE || '128' }}
      EMBEDDING_REQUESTS_PER_MINUTE: ${{ vars.EMBEDDING_REQUESTS_PER_MINUTE || '2' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      PYTHONPATH: .
      TICKERS: ${{ github.event.inputs.tickers || 'AAPL MSFT NVDA AMZN GOOGL' }}
      FORMS: ${{ github.event.inputs.forms || '10-K 10-Q' }}
      LIMIT: ${{ github.event.inputs.limit || '1' }}
      FORCE_PARSE: ${{ github.event.inputs.force_parse || 'false' }}
    steps:
      - name: Validate inputs
        run: |
          [[ "${TICKERS}" =~ ^[A-Z0-9.-]+([[:space:]]+[A-Z0-9.-]+)*$ ]]
          [[ "${FORMS}" =~ ^[0-9A-Z-]+([[:space:]]+[0-9A-Z-]+)*$ ]]
          [[ "${LIMIT}" =~ ^[1-9][0-9]*$ ]]
          [[ "${FORCE_PARSE}" =~ ^(true|false)$ ]]

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Ingest filing metadata
        run: |
          read -r -a ticker_args <<< "${TICKERS}"
          read -r -a form_args <<< "${FORMS}"
          python scripts/ingest_sec_sample.py \
            --tickers "${ticker_args[@]}" \
            --forms "${form_args[@]}" \
            --limit "${LIMIT}"

      - name: Download and parse filings
        run: |
          read -r -a ticker_args <<< "${TICKERS}"
          read -r -a form_args <<< "${FORMS}"
          force_args=()
          if [ "${FORCE_PARSE}" = "true" ]; then
            force_args+=(--force-parse)
          fi
          python -m scripts.download_filings \
            --tickers "${ticker_args[@]}" \
            --forms "${form_args[@]}" \
            --limit "${LIMIT}" \
            --download \
            --parse \
            "${force_args[@]}"

      - name: Chunk documents
        run: |
          read -r -a ticker_args <<< "${TICKERS}"
          python -m scripts.retrieval_pipeline chunk --tickers "${ticker_args[@]}"

      - name: Build missing embeddings
        run: python -m scripts.retrieval_pipeline index
